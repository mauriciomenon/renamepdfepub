name: Tests

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install pytest
          sudo apt-get update
          sudo apt-get install -y xvfb
      - name: Prepare CI filesystem
        run: |
          mkdir -p books
          printf '%s\n' '%PDF-1.4' > books/sample.pdf
      - name: Run unit/integration (no slow)
        run: |
          xvfb-run -a python -m pytest -q -k "not slow"
      - name: Upload JUnit report (unit)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: junit-unit
          path: junit-unit.xml
        continue-on-error: true

  perf:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install pytest tqdm
      - name: Run slow tests
        run: |
          python -m pytest -q -m slow --junitxml=junit-slow.xml
      - name: Upload JUnit report (slow)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: junit-slow
          path: junit-slow.xml
        continue-on-error: true

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install pytest tqdm
      - name: Run integration tests
        run: |
          python -m pytest -q -m integration --junitxml=junit-integration.xml
      - name: Upload JUnit report (integration)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: junit-integration
          path: junit-integration.xml
        continue-on-error: true
